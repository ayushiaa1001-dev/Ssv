<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | Ssv Pharmaceuticals</title>
  <!--
    NOTE: This file is REPLACED at build time by generate-routes.js.
    dist/404.html becomes a copy of dist/index.html so that GitHub Pages
    serves the React SPA shell (with no JS redirect) for unknown routes.

    The old window.location.replace() SPA redirect hack has been removed.
    It caused Google Search Console to report "Failed: Redirect error"
    because Googlebot treats JS-based redirects differently from HTTP redirects.
  -->
  <meta name="robots" content="noindex, nofollow">
</head>
<body>
  <p>Page not found. <a href="/">Go to homepage</a></p>
</body>
</html>
